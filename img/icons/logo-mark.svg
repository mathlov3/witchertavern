<svg id="logo-mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" role="img" aria-label="Таверна Відьмака">

  <!-- ── Icon medallion (same as standalone, left-aligned) ── -->
  <circle cx="24" cy="24" r="23.5" fill="#1a1108"/>
  <circle cx="24" cy="24" r="22"   fill="none" stroke="#c89028" stroke-width="2"/>
  <circle cx="24" cy="24" r="18.5" fill="none" stroke="#c89028" stroke-width="0.6" opacity="0.45"/>

  <polygon points="24,3.5 25.5,5 24,6.5 22.5,5"    fill="#c89028"/>
  <polygon points="24,41.5 25.5,43 24,44.5 22.5,43" fill="#c89028"/>
  <polygon points="3.5,24 5,25.5 6.5,24 5,22.5"    fill="#c89028"/>
  <polygon points="41.5,24 43,25.5 44.5,24 43,22.5" fill="#c89028"/>

  <g transform="rotate(-32 24 24)"
     fill="#c89028"
     stroke="#8a5a1f"
     stroke-width="0.5"
     stroke-linejoin="round"
     stroke-linecap="round">

    <!-- Tines -->
    <path d="M21.2 11.5 C21.2 10.8 22 10.8 22 11.5 L22 18.5 C22 19.2 21.2 19.2 21.2 18.5 Z"/>
    <path d="M23.4 11.5 C23.4 10.8 24.2 10.8 24.2 11.5 L24.2 18.5 C24.2 19.2 23.4 19.2 23.4 18.5 Z"/>
    <path d="M25.6 11.5 C25.6 10.8 26.4 10.8 26.4 11.5 L26.4 18.5 C26.4 19.2 25.6 19.2 25.6 18.5 Z"/>

    <!-- Neck -->
    <path d="M21.5 18.5 C21 21 22.5 22.8 24 22.8 C25.5 22.8 27 21 26.5 18.5 Z"/>

    <!-- Handle -->
    <path d="M23.1 22.8 C22.8 28 22.9 32 23.2 36.5 C23.3 37.5 24.7 37.5 24.8 36.5 C25.1 32 25.2 28 24.9 22.8 Z"/>

  </g>

  <g transform="rotate(32 24 24)"
     fill="#c89028"
     stroke="#8a5a1f"
     stroke-width="0.6"
     stroke-linejoin="round"
     stroke-linecap="round">

    <!-- Blade -->
    <path d="M24 9.5 L22 21.5 L26 21.5 Z"/>

    <!-- Fuller -->
    <line x1="24" y1="12" x2="24" y2="21" stroke-width="0.4"/>

    <!-- Crossguard -->
    <path d="M19.5 21.5 Q24 23 28.5 21.5 L28.5 23 L19.5 23 Z"/>

    <!-- Grip -->
    <rect x="23.25" y="23" width="1.5" height="11.5" rx="0.75"/>

    <!-- Pommel -->
    <circle cx="24" cy="36.8" r="1.8"/>

  </g>

  <!-- ── Wordmark text ──────────────────────────────────── -->
  <!-- "ТАВЕРНА" — small caps label -->
  <text
    x="56" y="20"
    font-family="'Playfair Display', Georgia, serif"
    font-size="11"
    font-weight="600"
    letter-spacing="2"
    fill="#c4a070"
    opacity="0.85">ТАВЕРНА</text>

  <!-- "Відьмака" — large brand name -->
  <text
    x="55" y="37"
    font-family="'Playfair Display', Georgia, serif"
    font-size="18"
    font-weight="700"
    letter-spacing="-0.3"
    fill="#c89028">Відьмака</text>

</svg>
